version: '3.8'

services:
  flask-prp-generator:
    build: .
    ports:
      - "8000:8000"
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-change-this-in-production}
      - DATABASE_URL=sqlite:///flask_prp_wrapper.db
      - PYTHONPATH=/app
      # Add API keys as needed
      # - OPENAI_API_KEY=${OPENAI_API_KEY}
      # - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # - WEB_SEARCH_API_KEY=${WEB_SEARCH_API_KEY}
    volumes:
      - ./PRPs:/app/PRPs:ro  # Mount PRPs directory as read-only
      - prp_data:/app/data   # Persistent data storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Add Redis for session storage and caching
  # redis:
  #   image: redis:7-alpine
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis_data:/data
  #   restart: unless-stopped

  # Optional: Add PostgreSQL for production database
  # postgres:
  #   image: postgres:15-alpine
  #   environment:
  #     POSTGRES_DB: flask_prp_wrapper
  #     POSTGRES_USER: ${POSTGRES_USER:-prp_user}
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_this_password}
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   ports:
  #     - "5432:5432"
  #   restart: unless-stopped

volumes:
  prp_data:
